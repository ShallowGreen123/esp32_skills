[platformio]
default_envs = cc1101_smoke

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_flags =
    -Ilib/demo_core/include

[env:cc1101_smoke]
; 已确认信息：
; - 官方 README 的 Arduino 板卡设置为 ESP32S3 Dev Module
; - Flash / PSRAM = 16MB / 8MB
; - USB CDC On Boot = Enable
; - USB Mode = CDC and JTAG
; 官方 PlatformIO 工程带有 boards/ 自定义板卡信息，但当前本地项目还未导入该 JSON。
; 因此这里先保留为待确认，不直接写死，避免误配 Flash / PSRAM / USB 参数。
; 可作为第一候选的通用板卡：
; board = esp32-s3-devkitc-1
build_src_filter =
    +<examples/cc1101_smoke/>
    +<lib/demo_core/src/>
